    <header class="space-y-3">
      <h1 class="text-5xl font-bold">Job Application Tracker</h1>
      <div class="grid grid-cols-3 gap-4">
        <div class="p-5 bg-white rounded-lg">
          <p>Total</p>
          <p id="total" class="font-bold text-2xl">0</p>
        </div>
        <div class="p-5 bg-white rounded-lg">
          <p>Interview</p>
          <p id="interview" class="font-bold text-2xl text-green-400">0</p>
        </div>
        <div class="p-5 bg-white rounded-lg">
          <p>Rejected</p>
          <p id="rejected" class="font-bold text-2xl text-red-400">0</p>
        </div>
      </div>
    </header>
    <hr class="my-7 text-gray-400" />

    <main>
      <!-- available job section  -->
      <section class="space-y-6">
        <div class="flex justify-between">
          <h1 class="text-2xl font-bold">Available jobs</h1>
          <p class="text-[#64748B]"><span id="jobs-count">8</span> jobs</p>
        </div>
        <!-- three tabs -->
        <div class="flex gap-2">
          <button
            id="all-btn"
            class="px-5 py-2 cursor-pointer rounded-lg bg-blue-500 text-white"
          >
            All
          </button>
          <button
            id="interview-btn"
            class="px-5 py-2 cursor-pointer bg-white rounded-lg text-[#64748B]"
          >
            Interview
          </button>
          <button
            id="rejected-btn"
            class="px-5 py-2 cursor-pointer bg-white rounded-lg text-[#64748B]"
          >
            Rejected
          </button>
        </div>
      </section>
